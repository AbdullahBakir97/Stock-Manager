name: CI

# Fast pre-merge checks on every push / PR to the integration branches.
# (Tag pushes are handled separately by release.yml.)
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r stock-manager/requirements.txt
          pip install ruff

      # Informational: catches syntax errors and undefined names without
      # failing the build on style nits.
      - name: Lint — syntax & undefined names (ruff)
        continue-on-error: true
        working-directory: stock-manager/src/files
        run: ruff check app --select E9,F821,F811

      # Gate 1 — the base _DDL must contain every migration-added column, so a
      # fresh/cloud database is never missing a column at runtime. This guards
      # the `no such column: cost_price` / `suppliers.rating` class of bug.
      - name: Schema parity (no DDL drift)
        working-directory: stock-manager/src/files
        env:
          QT_QPA_PLATFORM: offscreen
        run: python tests/test_schema_parity.py

      # Gate 2 — every PDF report must generate cleanly, with no blank pages,
      # against a seeded multi-page dataset. Guards the report pagination /
      # rendering regressions.
      - name: Report smoke (PDF reports render, no blank pages)
        working-directory: stock-manager/src/files
        env:
          QT_QPA_PLATFORM: offscreen
        run: python tests/test_report_smoke.py
