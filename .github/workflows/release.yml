name: Build, Sign & Release

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on: git tag v2.3.0 && git push --tags

jobs:
  build-and-sign:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        working-directory: src/files
        run: |
          python -m pip install --upgrade pip
          pip install -r ../../requirements.txt
          pip install pyinstaller==6.19.0

      # ── 4. Extract version from tag ──────────────────────────────────────────
      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # ── 5. PyInstaller build ─────────────────────────────────────────────────
      - name: Build with PyInstaller
        working-directory: src
        run: pyinstaller StockManagerPro.spec --noconfirm --clean

      # ── 6. Inno Setup installer ───────────────────────────────────────────────
      - name: Install Inno Setup 7
        run: |
          choco install innosetup --version=7.0.0 -y
        shell: powershell

      - name: Compile installer
        working-directory: src
        run: |
          & "C:\Program Files (x86)\Inno Setup 7\ISCC.exe" `
            installer\StockManagerPro.iss `
            /DSourceDir="$PWD\dist\StockManagerPro" `
            /DAppVersion="${{ steps.version.outputs.VERSION }}"
        shell: powershell

      # ── 7. Submit to SignPath for signing ────────────────────────────────────
      - name: Sign installer via SignPath
        uses: SignPath/github-action-submit-signing-request@v1
        with:
          api-token:            '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id:      '9d35403b-323c-44c2-9736-13e2d8660444'
          project-slug:         'Stock_Manager_Pro'
          signing-policy-slug:  'test-signing'
          artifact-configuration-slug: 'installer'
          github-artifact-id:   'unsigned-installer'
          wait-for-completion:  true
          output-artifact-directory: src/installer/Output/signed

      # ── 8. Compute SHA256 of signed installer ────────────────────────────────
      - name: Compute SHA256
        id: sha256
        shell: powershell
        run: |
          $hash = (Get-FileHash "src\installer\Output\signed\StockManagerPro-${{ steps.version.outputs.VERSION }}-setup.exe" -Algorithm SHA256).Hash
          echo "HASH=$hash" >> $env:GITHUB_OUTPUT

      # ── 9. Update update_manifest.json ───────────────────────────────────────
      - name: Update update_manifest.json
        shell: python
        run: |
          import json, os
          version = "${{ steps.version.outputs.VERSION }}"
          sha256  = "${{ steps.sha256.outputs.HASH }}"
          manifest = {
            "version": version,
            "download_url": f"https://github.com/${{ github.repository }}/releases/download/v{version}/StockManagerPro-{version}-setup.exe",
            "release_notes": f"See https://github.com/${{ github.repository }}/releases/tag/v{version}",
            "release_date": os.popen("date /t").read().strip(),
            "checksum_sha256": sha256.lower()
          }
          with open("update_manifest.json", "w") as f:
            json.dump(manifest, f, indent=2)

      - name: Commit updated manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update_manifest.json
          git commit -m "chore: update manifest for ${{ github.ref_name }}" || echo "No changes"
          git push origin HEAD:main || echo "Push skipped"
        shell: bash

      # ── 10. Upload signed installer as artifact ───────────────────────────────
      - name: Upload signed installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-installer
          path: src/installer/Output/signed/StockManagerPro-${{ steps.version.outputs.VERSION }}-setup.exe

      # ── 11. Create GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Stock Manager Pro v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Stock Manager Pro v${{ steps.version.outputs.VERSION }}

            ### Installation
            Download `StockManagerPro-${{ steps.version.outputs.VERSION }}-setup.exe` below and run it.

            **SHA256:** `${{ steps.sha256.outputs.HASH }}`

            ### What's new
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          files: |
            src/installer/Output/signed/StockManagerPro-${{ steps.version.outputs.VERSION }}-setup.exe
          draft: false
          prerelease: false
