name: Build, Sign & Release

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on: git tag v2.3.x && git push --tags

jobs:
  build-and-sign:
    runs-on: windows-latest
    permissions:
      contents: write       # create releases, push commits
      pull-requests: write  # create and merge release PRs

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for changelog extraction

      # ── 2. Set up Python ─────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r stock-manager/requirements.txt
          pip install pyinstaller==6.19.0
          pip install Pillow

      # ── 4. Extract version from tag ──────────────────────────────────────────
      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # ── 5. Extract changelog for this version ────────────────────────────────
      - name: Extract changelog entry
        id: changelog
        shell: python
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          GH_REPO: ${{ github.repository }}
        run: |
          import re, os, sys

          version = os.environ["VERSION"]
          changelog_path = "CHANGELOG.md"

          try:
              with open(changelog_path, encoding="utf-8") as f:
                  content = f.read()
          except FileNotFoundError:
              print(f"WARNING: {changelog_path} not found — using default notes")
              notes = f"Release v{version}"
              short = notes
          else:
              # Match the block between ## [VERSION] and the next ## heading
              pattern = rf"## \[{re.escape(version)}\].*?\n(.*?)(?=\n## \[|\Z)"
              match = re.search(pattern, content, re.DOTALL)
              if match:
                  notes = match.group(1).strip()
              else:
                  notes = f"See full changelog at https://github.com/{os.environ['GH_REPO']}/blob/main/CHANGELOG.md"

              # Short version for the in-app banner (first 2 bullet points)
              bullets = [l.strip() for l in notes.splitlines() if l.strip().startswith("-")]
              short = "; ".join(b.lstrip("- ") for b in bullets[:3])
              if not short:
                  short = f"v{version} — see changelog for details"

          # Write to GITHUB_OUTPUT (multiline safe)
          delimiter = "EOF_NOTES"
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"NOTES<<{delimiter}\n{notes}\n{delimiter}\n")
              out.write(f"SHORT={short}\n")

      # ── 6. Stamp CHANGELOG — move [Unreleased] → [VERSION] ───────────────────
      - name: Stamp changelog
        shell: python
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          from datetime import date
          import re, os

          version  = os.environ["VERSION"]
          today    = date.today().isoformat()
          path     = "CHANGELOG.md"

          with open(path, encoding="utf-8") as f:
              content = f.read()

          # Idempotent: if a "## [VERSION]" section already exists (the author
          # wrote the changelog entry by hand before tagging), leave it as-is so
          # we never create a duplicate heading.
          if re.search(rf"^## \[{re.escape(version)}\]", content, re.M):
              print(f"CHANGELOG already has a [{version}] section — leaving as-is")
          else:
              # Otherwise stamp the running [Unreleased] block into [VERSION] and
              # re-seed a fresh, empty [Unreleased] at the top.
              unreleased_block = (
                  "## [Unreleased]\n\n"
                  "> Add your next changes here before tagging a release.\n\n---\n\n"
              )
              versioned_heading = f"## [{version}] - {today}\n"

              if "## [Unreleased]" in content:
                  content = content.replace(
                      "## [Unreleased]",
                      f"{unreleased_block}{versioned_heading}",
                      1,
                  )
                  # Remove the placeholder when [Unreleased] was empty so we don't
                  # leave "> Add your next changes…" directly above the new section.
                  content = re.sub(
                      r"> Add your next changes here before tagging a release\.\n\n---\n\n"
                      + re.escape(versioned_heading),
                      versioned_heading,
                      content,
                  )
              else:
                  # No [Unreleased] marker at all — prepend a fresh section.
                  content = content.replace(
                      "---\n", f"---\n\n{versioned_heading}", 1,
                  )

              with open(path, "w", encoding="utf-8") as f:
                  f.write(content)
              print(f"Stamped CHANGELOG [Unreleased] -> [{version}]")

      # ── 6b. Stamp version into source files ──────────────────────────────────
      - name: Stamp version into source files
        shell: python
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          import re, os

          version = os.environ["VERSION"]
          parts = [int(x) for x in version.split(".")]
          while len(parts) < 4:
              parts.append(0)

          # 1. version.py — single source of truth for runtime
          vpy = "stock-manager/src/files/app/core/version.py"
          with open(vpy, "r", encoding="utf-8") as f:
              content = f.read()
          content = re.sub(
              r'APP_VERSION\s*=\s*".*?"',
              f'APP_VERSION = "{version}"',
              content,
          )
          with open(vpy, "w", encoding="utf-8") as f:
              f.write(content)
          print(f"Stamped {vpy} -> {version}")

          # 1b. installer/version.py — duplicate APP_VERSION constant kept beside
          #     the installer scripts; stamp it too so it never drifts.
          vpy2 = "stock-manager/src/installer/version.py"
          try:
              with open(vpy2, "r", encoding="utf-8") as f:
                  c2 = f.read()
              c2 = re.sub(
                  r'APP_VERSION\s*=\s*".*?"',
                  f'APP_VERSION = "{version}"',
                  c2,
              )
              with open(vpy2, "w", encoding="utf-8") as f:
                  f.write(c2)
              print(f"Stamped {vpy2} -> {version}")
          except FileNotFoundError:
              print(f"WARN: {vpy2} not found — skipped")

          # 2. file_version_info.txt — Windows PE resource
          fvi = "stock-manager/src/installer/file_version_info.txt"
          with open(fvi, "r", encoding="utf-8") as f:
              content = f.read()
          tup = f"({parts[0]}, {parts[1]}, {parts[2]}, {parts[3]})"
          content = re.sub(r"filevers=\(.*?\)", f"filevers={tup}", content)
          content = re.sub(r"prodvers=\(.*?\)", f"prodvers={tup}", content)
          content = re.sub(
              r"StringStruct\(u'FileVersion',\s*u'.*?'\)",
              f"StringStruct(u'FileVersion',      u'{version}.0')",
              content,
          )
          content = re.sub(
              r"StringStruct\(u'ProductVersion',\s*u'.*?'\)",
              f"StringStruct(u'ProductVersion',   u'{version}')",
              content,
          )
          with open(fvi, "w", encoding="utf-8") as f:
              f.write(content)
          print(f"Stamped {fvi} -> {tup}")

          # 3. StockManagerPro.iss — installer source version (#define) AND the
          #    human-readable header/output comments, so the whole file is
          #    coherent (no stale "Version : 2.3.0" left behind).
          iss = "stock-manager/src/installer/StockManagerPro.iss"
          with open(iss, "r", encoding="utf-8") as f:
              content = f.read()
          content = re.sub(
              r'#define AppVersion ".*?"',
              f'#define AppVersion "{version}"',
              content,
          )
          # Header comment ";  Version : X.Y.Z"
          content = re.sub(
              r'(;\s*Version\s*:\s*)\d+\.\d+\.\d+',
              rf'\g<1>{version}',
              content,
          )
          # Literal output filename in the build-instructions comment
          # (the real OutputBaseFilename uses {#AppVersion} and is untouched).
          content = re.sub(
              r'StockManagerPro-\d+\.\d+\.\d+-setup',
              f'StockManagerPro-{version}-setup',
              content,
          )
          with open(iss, "w", encoding="utf-8") as f:
              f.write(content)
          print(f"Stamped {iss} -> {version}")

          # 5. StockManagerPro.spec — header comment version (cosmetic, keeps
          #    the build manifest coherent with the release).
          spec = "stock-manager/src/StockManagerPro.spec"
          try:
              with open(spec, "r", encoding="utf-8") as f:
                  sc = f.read()
              sc = re.sub(
                  r'(Stock Manager Pro v)\d+(?:\.\d+)*',
                  rf'\g<1>{version}',
                  sc,
              )
              with open(spec, "w", encoding="utf-8") as f:
                  f.write(sc)
              print(f"Stamped {spec} -> {version}")
          except FileNotFoundError:
              print(f"WARN: {spec} not found — skipped")

          # 4. README.md — version badge + SQLite schema badge
          readme = "README.md"
          with open(readme, "r", encoding="utf-8") as f:
              content = f.read()
          # 4a. Green version badge — e.g. Version-2.4.2-10B981
          content = re.sub(
              r"Version-[\d.]+-10B981",
              f"Version-{version}-10B981",
              content,
          )
          # 4b. Blue SQLite schema badge — extract _SCHEMA_VERSION from
          #     database.py (single source of truth) and stamp the badge
          #     so README always shows the current schema generation.
          try:
              db_path = "stock-manager/src/files/app/core/database.py"
              with open(db_path, "r", encoding="utf-8") as f:
                  db_src = f.read()
              m = re.search(r'_SCHEMA_VERSION\s*=\s*"(\d+)"', db_src)
              if m:
                  schema = m.group(1)
                  content = re.sub(
                      r"Schema_V\d+-003B57",
                      f"Schema_V{schema}-003B57",
                      content,
                  )
                  print(f"Stamped {readme} -> schema V{schema}")
          except Exception as exc:
              print(f"WARN: schema badge not stamped ({exc})")
          with open(readme, "w", encoding="utf-8") as f:
              f.write(content)
          print(f"Stamped {readme} -> {version}")

      # ── 7. PyInstaller build ─────────────────────────────────────────────────
      - name: Build with PyInstaller
        working-directory: stock-manager/src
        run: pyinstaller StockManagerPro.spec --noconfirm --clean

      # ── 8. Inno Setup — compile installer ────────────────────────────────────
      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y --no-progress

      - name: Compile installer
        working-directory: stock-manager/src
        shell: powershell
        run: |
          $iscc = Get-ChildItem "C:\Program Files*\Inno Setup*\ISCC.exe" `
                    -ErrorAction SilentlyContinue |
                  Select-Object -First 1 -ExpandProperty FullName
          if (-not $iscc) { throw "ISCC.exe not found" }
          Write-Host "Using ISCC: $iscc"
          & $iscc installer\StockManagerPro.iss /DAppVersion="${{ steps.version.outputs.VERSION }}"

      # ── 9. Compute SHA256 ────────────────────────────────────────────────────
      - name: Compute SHA256
        id: sha256
        shell: powershell
        run: |
          $exe = "stock-manager\src\installer\Output\StockManagerPro-${{ steps.version.outputs.VERSION }}-setup.exe"
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash.ToLower()
          echo "HASH=$hash" >> $env:GITHUB_OUTPUT

      # ── 10. Update update_manifest.json ──────────────────────────────────────
      - name: Update update_manifest.json
        shell: python
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          SHA256: ${{ steps.sha256.outputs.HASH }}
          SHORT: ${{ steps.changelog.outputs.SHORT }}
          GH_REPO: ${{ github.repository }}
        run: |
          import json, os
          from datetime import date

          version = os.environ["VERSION"]
          sha256  = os.environ["SHA256"]
          short   = os.environ.get("SHORT", "")
          repo    = os.environ["GH_REPO"]

          manifest = {
              "version": version,
              "download_url": (
                  f"https://github.com/{repo}/releases/download/"
                  f"v{version}/StockManagerPro-{version}-setup.exe"
              ),
              "release_notes": short or f"v{version} released {date.today().isoformat()}",
              "release_date": date.today().isoformat(),
              "checksum_sha256": sha256,
          }

          with open("stock-manager/update_manifest.json", "w", encoding="utf-8") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")

      # ── 11. Push stamped files to release branch ─────────────────────────────
      - name: Create release branch
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          RELEASE_BRANCH="release/v${VERSION}"
          RELEASE_FILES=(
            CHANGELOG.md
            README.md
            stock-manager/update_manifest.json
            stock-manager/src/StockManagerPro.spec
            stock-manager/src/files/app/core/version.py
            stock-manager/src/installer/version.py
            stock-manager/src/installer/file_version_info.txt
            stock-manager/src/installer/StockManagerPro.iss
          )

          # Branch from the TAGGED commit (current HEAD). actions/checkout
          # left us on the pushed tag, which lives on the dev branch — so the
          # release branch carries the FULL tagged update (every dev commit),
          # not just the stamped files. The stamping steps above already
          # modified the working tree; commit them on top.
          #
          # This is the fix for "main only ever got the version bump": the
          # branch used to be reset to origin/main and only the 6 stamped
          # files copied over, so the actual feature/fix commits tagged on dev
          # never reached main. Basing on the tag means merging the release PR
          # (step 11b) brings the complete update into main.
          #
          # Pre-req for a clean auto-merge: dev must be a descendant of main
          # (i.e. main is merged into dev before tagging). The release merge
          # keeps them in sync, so as long as dev stays the integration branch
          # this stays conflict-free.
          git checkout -B "$RELEASE_BRANCH"

          git add "${RELEASE_FILES[@]}"
          if git diff --cached --quiet; then
            echo "No stamped changes to commit (release branch still carries the tagged update)"
          else
            git commit -m "chore: release v${VERSION} — stamp changelog, manifest & version files"
          fi

          # Push release branch
          git push origin "$RELEASE_BRANCH" --force
          echo "Release branch pushed: $RELEASE_BRANCH"

      # ── 11b. Create PR and auto-merge release → main ─────────────────────────
      - name: Create and merge release PR
        id: pr
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_BRANCH="release/v${VERSION}"

          # Create the PR
          PR_URL=$(gh pr create \
            --base main \
            --head "$RELEASE_BRANCH" \
            --title "Release v${VERSION}" \
            --body "## Release v${VERSION}

          Automated release PR — stamps version files, changelog, and update manifest.

          **Changes:**
          - \`version.py\` → \`${VERSION}\`
          - \`file_version_info.txt\` → \`${VERSION}\`
          - \`StockManagerPro.iss\` → \`${VERSION}\`
          - \`README.md\` version badge → \`${VERSION}\`
          - \`CHANGELOG.md\` — \[Unreleased\] stamped
          - \`update_manifest.json\` — download URL + SHA256

          ---
          *Auto-generated by the release pipeline.*")

          echo "PR created: $PR_URL"

          # Capture the PR number for the back-merge step (it survives the
          # branch deletion that --delete-branch performs on merge).
          PR_NUMBER=$(gh pr view "$RELEASE_BRANCH" --json number -q .number)
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

          # Auto-merge the PR (merge commit for clean history)
          gh pr merge "$RELEASE_BRANCH" \
            --merge \
            --auto \
            --subject "chore: release v${VERSION} (#${PR_NUMBER})" \
            --delete-branch

          echo "PR #${PR_NUMBER} queued for auto-merge"

      # ── 11c. Back-merge main → dev (keep dev a superset of main) ──────────────
      #  The release PR adds the stamp + merge commits to main. Without bringing
      #  them back, the NEXT release branch (cut from dev) diverges from main and
      #  its PR fails to auto-merge — exactly the failure that blocked v2.5.8.
      #  Waiting for the merge to land, then fast-following dev, keeps the two
      #  branches permanently in sync so releases never conflict again.
      - name: Sync release back into dev
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Wait (up to ~5 min) for the auto-merge to actually land on main.
          PR_NUMBER="${{ steps.pr.outputs.pr_number }}"
          for i in $(seq 1 30); do
            STATE=$(gh pr view "$PR_NUMBER" --json state -q .state 2>/dev/null || echo "")
            if [ "$STATE" = "MERGED" ]; then echo "Release PR #${PR_NUMBER} merged."; break; fi
            echo "Waiting for release PR #${PR_NUMBER} to merge (state=${STATE:-unknown})…"
            sleep 10
          done

          git fetch origin main dev
          git checkout -B dev origin/dev
          if git merge --no-edit origin/main; then
            git push origin dev
            echo "dev fast-followed main — branches back in sync"
          else
            echo "::warning::Back-merge into dev conflicted — run 'git merge origin/main' on dev manually before the next release"
            git merge --abort || true
          fi

      # ── 12. Upload installer artifact ─────────────────────────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: StockManagerPro-${{ steps.version.outputs.VERSION }}-setup
          path: stock-manager/src/installer/Output/StockManagerPro-${{ steps.version.outputs.VERSION }}-setup.exe

      # ── 13. Create GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Stock Manager Pro v${{ steps.version.outputs.VERSION }}"
          body: |
            ## What's new in v${{ steps.version.outputs.VERSION }}

            ${{ steps.changelog.outputs.NOTES }}

            ---

            ### Installation
            1. Download `StockManagerPro-${{ steps.version.outputs.VERSION }}-setup.exe` below
            2. Run the installer — existing data is preserved automatically
            3. If you already have the app installed, it will prompt you to update on next launch

            **SHA256:** `${{ steps.sha256.outputs.HASH }}`

            ### Full changelog
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
          files: |
            stock-manager/src/installer/Output/StockManagerPro-${{ steps.version.outputs.VERSION }}-setup.exe
          draft: false
          prerelease: false
