{% extends "base.html" %}
{% block title %}{{ "Edit Customer" if mode == "edit" else "New Customer" }} — Stock Pro{% endblock %}
{% block page_title %}{{ "Edit Customer" if mode == "edit" else "New Customer" }}{% endblock %}

{% block content %}
<form method="POST">
  <div class="card-dark">
    <div class="form-group">
      <label class="form-label-dark">Name *</label>
      <input type="text" name="name" class="input-dark" required
             value="{{ customer.name if customer else '' }}" placeholder="Customer full name">
    </div>
    <div class="form-group">
      <label class="form-label-dark">Phone</label>
      <input type="tel" name="phone" class="input-dark"
             value="{{ customer.phone if customer else '' }}" placeholder="+1 234 567 8900">
    </div>
    <div class="form-group">
      <label class="form-label-dark">Email</label>
      <input type="email" name="email" class="input-dark"
             value="{{ customer.email if customer else '' }}" placeholder="customer@example.com">
    </div>
    <div class="form-group">
      <label class="form-label-dark">Address</label>
      <textarea name="address" class="input-dark" rows="2"
                placeholder="Optional address">{{ customer.address if customer else '' }}</textarea>
    </div>
    <div class="form-group">
      <label class="form-label-dark">Notes</label>
      <textarea name="notes" class="input-dark" rows="2"
                placeholder="Optional notes">{{ customer.notes if customer else '' }}</textarea>
    </div>
  </div>
  <div style="display:flex; gap:10px;">
    <button type="submit" class="btn-emerald" style="flex:1;">
      <i class="bi bi-check-lg"></i>
      {{ "Save Changes" if mode == "edit" else "Add Customer" }}
    </button>
    <a href="{{ '/customers/' ~ customer.id if mode == 'edit' else '/customers' }}"
       class="btn-outline-emerald" style="flex:1; text-align:center;">Cancel</a>
  </div>
</form>
{% endblock %}
