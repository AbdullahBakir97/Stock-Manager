{% extends "base.html" %}
{% block title %}New Purchase Order — Stock Pro{% endblock %}
{% block page_title %}New Purchase Order{% endblock %}

{% block content %}
<form method="POST" id="poForm">
  <input type="hidden" name="lines_json" id="linesJson" value="[]">

  <!-- Supplier & notes -->
  <div class="card-dark">
    <div class="form-group">
      <label class="form-label-dark">Supplier</label>
      <select name="supplier_id" class="input-dark">
        <option value="">No supplier</option>
        {% for s in suppliers %}
        <option value="{{ s.id }}">{{ s.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label-dark">Notes</label>
      <textarea name="notes" class="input-dark" rows="2" placeholder="Optional notes"></textarea>
    </div>
  </div>

  <!-- Item search -->
  <div class="card-dark">
    <div class="section-title" style="margin-top:0;">Add Items</div>
    <input type="text" id="itemSearch" class="search-box"
           placeholder="Search inventory items..." autocomplete="off">
    <div id="searchResults" style="margin-top:8px;"></div>
  </div>

  <!-- Lines -->
  <div class="card-dark">
    <div class="section-title" style="margin-top:0;">Order Lines</div>
    <div id="linesEmpty" style="text-align:center; color:var(--muted); padding:16px 0; font-size:.88rem;">
      No items added yet
    </div>
    <div id="linesList"></div>
    <div id="linesTotal" style="display:none; border-top:1px solid var(--border); padding-top:10px; margin-top:4px;
                                 display:flex; justify-content:space-between; font-weight:700;">
      <span>Total</span>
      <span id="totalDisp" style="color:var(--emerald);">0.00</span>
    </div>
  </div>

  <button type="submit" id="submitBtn" class="btn-emerald" disabled style="width:100%; opacity:.5;">
    <i class="bi bi-bag-check"></i> Create Purchase Order
  </button>
</form>
{% endblock %}

{% block scripts %}
<script>
let lines = [];

const searchInput = document.getElementById('itemSearch');
let timer;
searchInput.addEventListener('input', () => {
  clearTimeout(timer);
  const q = searchInput.value.trim();
  if (!q) { document.getElementById('searchResults').innerHTML = ''; return; }
  timer = setTimeout(() => fetchItems(q), 300);
});

async function fetchItems(q) {
  const res = await fetch('/api/items/search?q=' + encodeURIComponent(q));
  const items = await res.json();
  // Show all items including out-of-stock for POs
  const res2 = await fetch('/api/items/search?q=' + encodeURIComponent(q));
  const el = document.getElementById('searchResults');
  if (!items.length) {
    el.innerHTML = '<div style="font-size:.82rem;color:var(--muted);padding:6px 0;">No items found</div>';
    return;
  }
  el.innerHTML = items.map(i => `
    <div onclick="addLine(${i.id}, ${JSON.stringify(i.name)})"
         style="padding:10px; border-radius:8px; cursor:pointer; margin-bottom:4px;
                background:var(--card2); border:1px solid var(--border);">
      <div style="font-weight:600; font-size:.88rem;">${i.name}</div>
      <div style="font-size:.74rem; color:var(--muted);">Current stock: ${i.stock}</div>
    </div>
  `).join('');
}

function addLine(id, name) {
  if (lines.find(l => l.item_id == id)) return;
  lines.push({ item_id: id, name, quantity: 1, cost_price: 0 });
  searchInput.value = '';
  document.getElementById('searchResults').innerHTML = '';
  renderLines();
}

function removeLine(id) {
  lines = lines.filter(l => l.item_id != id);
  renderLines();
}

function updateLine(id, field, val) {
  const l = lines.find(l => l.item_id == id);
  if (l) l[field] = parseFloat(val) || 0;
  renderLines();
}

function renderLines() {
  const el = document.getElementById('linesList');
  const empty = document.getElementById('linesEmpty');
  const totalEl = document.getElementById('linesTotal');
  const btn = document.getElementById('submitBtn');
  if (!lines.length) {
    el.innerHTML = ''; empty.style.display = ''; totalEl.style.display = 'none';
    btn.disabled = true; btn.style.opacity = '.5'; return;
  }
  empty.style.display = 'none'; totalEl.style.display = 'flex';
  btn.disabled = false; btn.style.opacity = '1';
  el.innerHTML = lines.map(l => `
    <div style="display:flex; gap:8px; padding:10px 0; border-bottom:1px solid var(--border); align-items:center;">
      <div style="flex:1; min-width:0;">
        <div style="font-weight:600; font-size:.88rem;">${l.name}</div>
        <div style="display:flex; gap:6px; margin-top:6px; align-items:center;">
          <input type="number" min="1" value="${l.quantity}" class="input-dark"
                 style="width:70px; padding:6px 8px; text-align:center;"
                 onchange="updateLine(${l.item_id}, 'quantity', this.value)">
          <span style="color:var(--muted); font-size:.8rem;">×</span>
          <input type="number" min="0" step="0.01" value="${l.cost_price.toFixed(2)}" class="input-dark"
                 style="width:90px; padding:6px 8px;"
                 placeholder="Cost" onchange="updateLine(${l.item_id}, 'cost_price', this.value)">
        </div>
      </div>
      <div style="text-align:right; flex-shrink:0;">
        <div style="font-weight:700; color:var(--emerald); font-size:.9rem;">
          ${(l.quantity * l.cost_price).toFixed(2)}
        </div>
        <button type="button" onclick="removeLine(${l.item_id})"
                style="background:none; border:none; color:var(--muted); cursor:pointer; font-size:.8rem; margin-top:4px;">
          <i class="bi bi-trash3"></i>
        </button>
      </div>
    </div>
  `).join('');
  const total = lines.reduce((s, l) => s + l.quantity * l.cost_price, 0);
  document.getElementById('totalDisp').textContent = total.toFixed(2);
  document.getElementById('linesJson').value = JSON.stringify(lines);
}
</script>
{% endblock %}
